name: Claude Review Handler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (leave empty for auto-detect)"
        required: false
        type: string
      upstream_repo:
        description: "Upstream repo"
        required: false
        default: "openclaw/openclaw"
        type: string
      since_minutes:
        description: "Look back N minutes for comments"
        required: false
        default: "120"
        type: string

env:
  UPSTREAM_REPO: openclaw/openclaw
  FORK_OWNER: zqchris
  POLL_WINDOW_MINUTES: 20

jobs:
  poll:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - name: Detect PRs with new review comments
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ inputs.upstream_repo || env.UPSTREAM_REPO }}"
          OWNER="${{ env.FORK_OWNER }}"

          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "Manual trigger for PR #${{ inputs.pr_number }}"
            echo 'matrix=[{"pr":${{ inputs.pr_number }},"since":${{ inputs.since_minutes || 120 }}}]' >> "$GITHUB_OUTPUT"
            echo "has_work=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SINCE="${{ env.POLL_WINDOW_MINUTES }}"
          CUTOFF=$(date -u -d "$SINCE minutes ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                   || date -u -v-${SINCE}M +%Y-%m-%dT%H:%M:%SZ)

          echo "Checking $REPO for PRs by $OWNER with comments since $CUTOFF"

          PRS=$(gh api "repos/$REPO/pulls?state=open&per_page=50" \
            --jq "[.[] | select(.user.login == \"$OWNER\") | .number]")

          if [ "$PRS" = "[]" ] || [ -z "$PRS" ]; then
            echo "No open PRs found."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Open PRs: $PRS"
          WORK="[]"

          for PR in $(echo "$PRS" | jq -r '.[]'); do
            NEW_COMMENTS=$(gh api "repos/$REPO/pulls/$PR/comments?since=$CUTOFF&per_page=5" \
              --jq "[.[] | select(.user.login != \"$OWNER\")] | length")
            NEW_ISSUE_COMMENTS=$(gh api "repos/$REPO/issues/$PR/comments?since=$CUTOFF&per_page=5" \
              --jq "[.[] | select(.user.login != \"$OWNER\")] | length")
            TOTAL=$((NEW_COMMENTS + NEW_ISSUE_COMMENTS))

            if [ "$TOTAL" -gt 0 ]; then
              echo "  PR #$PR: $TOTAL new comments"
              WORK=$(echo "$WORK" | jq ". + [{\"pr\": $PR, \"since\": $SINCE}]")
            else
              echo "  PR #$PR: no new comments"
            fi
          done

          COUNT=$(echo "$WORK" | jq length)
          echo "matrix=$WORK" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT PRs with new review comments"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "No new review comments to process"
          fi

  handle:
    needs: poll
    if: needs.poll.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.poll.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Get PR branch info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ inputs.upstream_repo || env.UPSTREAM_REPO }}"
          PR_DATA=$(gh api "repos/$REPO/pulls/${{ matrix.pr }}" \
            --jq '{head_ref: .head.ref, title: .title}')
          echo "branch=$(echo "$PR_DATA" | jq -r .head_ref)" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_DATA" | jq -r .title)" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          fetch-depth: 0

      - name: Collect and write review summary
        id: reviews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE_MIN: ${{ matrix.since }}
          PR_NUM: ${{ matrix.pr }}
        run: |
          REPO="${{ inputs.upstream_repo || env.UPSTREAM_REPO }}"
          PR=${{ matrix.pr }}

          gh api "repos/$REPO/pulls/$PR/comments" \
            --paginate --jq '.[] | {user: .user.login, path: .path, line: .line, body: .body, created_at: .created_at}' \
            > /tmp/all_comments.jsonl

          gh api "repos/$REPO/issues/$PR/comments" \
            --paginate --jq '.[] | {user: .user.login, path: "general", line: null, body: .body, created_at: .created_at}' \
            >> /tmp/all_comments.jsonl

          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timedelta, timezone

          since = int(os.environ.get("SINCE_MIN", "20"))
          cutoff = datetime.now(timezone.utc) - timedelta(minutes=since)
          skip_users = {"zqchris"}
          comments = []
          for line in open("/tmp/all_comments.jsonl"):
              line = line.strip()
              if not line:
                  continue
              c = json.loads(line)
              created = datetime.fromisoformat(c["created_at"].replace("Z", "+00:00"))
              if created < cutoff:
                  continue
              if c["user"] in skip_users:
                  continue
              comments.append(c)

          if not comments:
              print("No new review comments found.", file=sys.stderr)
              with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                  out.write("has_comments=false\n")
              sys.exit(0)

          pr = os.environ.get("PR_NUM", "?")
          # Write to workspace so Claude Code can read it
          summary_path = os.path.join(os.environ.get("GITHUB_WORKSPACE", "."), "REVIEW_COMMENTS.md")
          with open(summary_path, "w") as f:
              f.write(f"# Review comments on PR #{pr} ({len(comments)} comments)\n\n")
              f.write("For each actionable comment below, read the relevant source file, ")
              f.write("understand the issue, and fix it. Skip non-actionable comments.\n\n")
              for c in comments:
                  loc = f"{c['path']}:{c['line']}" if c["line"] else c["path"]
                  f.write(f"## {c['user']} @ {loc}\n")
                  f.write(c["body"] + "\n\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("has_comments=true\n")
          print(f"{len(comments)} review comments written to REVIEW_COMMENTS.md")
          PYEOF

      - name: Run Claude Code
        if: steps.reviews.outputs.has_comments == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the file REVIEW_COMMENTS.md in the repo root for code review
            feedback on PR #${{ matrix.pr }} ("${{ steps.pr-info.outputs.title }}").

            For each actionable comment, fix the code. After all fixes, commit
            and push. Delete REVIEW_COMMENTS.md before committing.
          claude_args: "--max-turns 30"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Edit",
                  "Write",
                  "Glob",
                  "Grep",
                  "Bash(git *)",
                  "Bash(npm *)",
                  "Bash(npx *)",
                  "Bash(pnpm *)",
                  "Bash(rm *)"
                ]
              }
            }
